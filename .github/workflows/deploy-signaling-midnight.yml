name: Signaling-Server Midnight Restart

on:
  schedule:
    # Jeden Tag um Mitternacht (UTC) prüfen
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Restart erzwingen (auch ohne Flag-Datei)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  restart-signaling:
    runs-on: ubuntu-latest
    steps:
      - name: Check and restart signaling server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            FLAG="/root/.signaling-restart-pending"
            FORCE="${{ github.event.inputs.force || 'false' }}"

            if [[ "$FORCE" == "true" ]]; then
              echo "⚡ Erzwungener Signaling-Restart (manuell ausgelöst)"
            elif [[ ! -f "$FLAG" ]]; then
              echo "✓ Kein Signaling-Restart nötig (keine ausstehenden Änderungen)"
              exit 0
            else
              echo "⏰ Geplanter Mitternachts-Restart"
              echo "   Flag erstellt: $(cat "$FLAG")"
            fi

            cd /root/Aregoland
            echo "→ Signaling-Server wird neu gebaut und gestartet ..."
            ./restart-signaling.sh
            echo "✓ Mitternachts-Restart abgeschlossen"
